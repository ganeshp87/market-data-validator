server.port=8082
spring.application.name=stream-validator

# SQLite datasource
spring.datasource.url=jdbc:sqlite:data/stream-validator.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

# Disable Spring Boot's auto schema.sql execution — SqliteConfig handles it
spring.sql.init.mode=never

# Validator thresholds — applied at startup before any connections are loaded.
# Override at runtime via PUT /api/validation/config.
validator.latency.warn-threshold-ms=500
validator.accuracy.spike-pct-threshold=10
validator.completeness.stale-threshold-ms=10000
validator.throughput.min-messages-per-second=5
