# Production profile — used inside Docker container
server.port=8082
spring.application.name=stream-validator

# SQLite datasource — path overridden by SPRING_DATASOURCE_URL env var in Docker
spring.datasource.url=jdbc:sqlite:/app/data/stream-validator.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

spring.sql.init.mode=never
